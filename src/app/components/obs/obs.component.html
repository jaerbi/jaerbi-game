<div class="p-6 bg-gray-800 rounded-2xl shadow-xl border border-gray-700 max-w-md mx-auto">
  <h2 class="text-gray-400 text-xs uppercase tracking-widest font-bold mb-4 text-center">Chess Score Admin</h2>
  
  <div class="grid grid-cols-2 gap-3">
    <!-- Win Button -->
    <button (click)="addPoint('wins')" 
      class="bg-green-600 hover:bg-green-500 active:bg-green-700 transition-colors text-white font-bold py-3 px-4 rounded-lg shadow-lg">
      Win +1
    </button>

    <!-- Draw Button -->
    <button (click)="addPoint('draws')" 
      class="bg-gray-600 hover:bg-gray-500 active:bg-gray-700 transition-colors text-white font-bold py-3 px-4 rounded-lg shadow-lg">
      Draw +1
    </button>

    <!-- Loss Button -->
    <button (click)="addPoint('losses')" 
      class="bg-red-600 hover:bg-red-500 active:bg-red-700 transition-colors text-white font-bold py-3 px-4 rounded-lg shadow-lg">
      Loss +1
    </button>

    <!-- Reset Button -->
    <button (click)="reset()" 
      class="bg-gray-800 hover:bg-gray-700 active:bg-gray-900 transition-colors text-gray-300 border border-gray-600 font-bold py-3 px-4 rounded-lg">
      Reset
    </button>
  </div>
</div>
