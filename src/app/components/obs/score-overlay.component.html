<div class="flex items-center gap-4 p-4">
  
  <!-- Wins -->
  <div class="flex flex-col items-center">
    <span class="text-[10px] uppercase tracking-widest text-green-400 font-bold">Wins</span>
    <span class="text-3xl font-black text-white font-mono">{{score.wins}}</span>
  </div>

  <!-- Divider -->
  <div class="h-8 w-px bg-gray-600"></div>

  <!-- Draws -->
  <div class="flex flex-col items-center">
    <span class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Draws</span>
    <span class="text-3xl font-black text-white font-mono">{{score.draws}}</span>
  </div>

  <!-- Divider -->
  <div class="h-8 w-px bg-gray-600"></div>

  <!-- Losses -->
  <div class="flex flex-col items-center">
    <span class="text-[10px] uppercase tracking-widest text-red-400 font-bold">Losses</span>
    <span class="text-3xl font-black text-white font-mono">{{score.losses}}</span>
  </div>

</div>
